<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>월별 공과금 관리</title>

<meta name="theme-color" content="#4CAF50">

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- ========================= -->
<!-- 메인 화면 -->
<!-- ========================= -->

<div id="homePage">

    <h1>월별 공과금 관리</h1>


    <div class="yearBox">

        <button id="prevYear">◀</button>

        <span id="year">2026</span>

        <button id="nextYear">▶</button>

    </div>


    <div id="monthList"></div>


</div>





<!-- ========================= -->
<!-- 월별 화면 -->
<!-- ========================= -->

<div id="monthPage" style="display:none;">


    <h2 id="monthTitle"></h2>



    <!-- 검색 -->
    <div class="searchBox">

        🔍

        <input 
        id="searchInput"
        type="text"
        placeholder="내용 검색">

    </div>





    <div class="topButtons">


        <button id="copyBtn">
            📋 지난달 불러오기
        </button>


        <button id="addBtn">
            ➕ 행 추가
        </button>


    </div>





    <table>


        <thead>


        <tr>

            <th width="15%">
                카테고리
            </th>


            <th width="25%">
                내용
            </th>


            <th width="10%">
                체크
            </th>


            <th width="20%">
                금액
            </th>


            <th width="20%">
                비고
            </th>


            <th width="10%">
                이동
            </th>


            <th width="10%">
                삭제
            </th>


        </tr>


        </thead>



        <tbody id="tableBody">


        </tbody>


    </table>





    <div class="totalBox">


        총합 :


        <span id="totalMoney">

            0원

        </span>


    </div>





    <div class="bottomButtons">


        <button id="saveBtn">

            💾 저장하기

        </button>



        <button id="backBtn">

            ↩ 나가기

        </button>


    </div>



</div>





<script src="script.js"></script>



<script>

if("serviceWorker" in navigator){

navigator.serviceWorker.register("service-worker.js");

}

</script>



</body>

</html>
